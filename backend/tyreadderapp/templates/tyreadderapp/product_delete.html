<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Product</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        select, button {
            font-size: 16px;
            padding: 5px 10px;
        }
        button {
            background-color: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Delete Product</h1>
    <form method="post">
        {% csrf_token %}
        <select name="product_id" required>
            <option value="">Select a product to delete</option>
            {% for product in products %}
                <option value="{{ product.id }}">Product #{{ product.id }} - {{ product.brand }} {{ product.tread }}</option>
            {% endfor %}
        </select>
        <button type="submit">Delete</button>
    </form>
</body>
</html>

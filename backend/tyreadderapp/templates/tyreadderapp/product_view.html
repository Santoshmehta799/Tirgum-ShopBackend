{% extends "tyreadderapp/base/base.html" %} {% load static %} {% load static %}
{% block css_files %}
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>
<link
  rel="stylesheet"
  href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"
/>

<!-- Własny CSS -->
<style>
  body {
    background-color: #f5f5f5;
  }

  label[for="productInput"] {
    font-size: 4rem;
    font-weight: bold;
    margin-bottom: 30px;
  }

  #productInput {
    border: 3px solid black;
    font-size: 4rem; /* DUŻY tekst */
    height: 300px; /* DUŻA wysokość */
    padding: 20px 30px; /* Wewnętrzny margines */
    width: 100%; /* Na całą szerokość kontenera */
    box-sizing: border-box; /* Padding nie zwiększa rozmiaru poza width */
  }

  button {
    font-weight: bold;
    font-size: 1.5rem;
    height:200px
  }
</style>
{% endblock %} {% block content %}
<div class="container mt-2">
  <div class="row">
    <div class="">
      
      <form
        id="productForm"
        method="GET"
        action="{% url 'tyreadderapp:tyre_product_view' %}"
      >
        <div class="form-group">
          <label for="productInput">Wprowadz id:</label>
          <input
            type="text"
            class="form-control form-control-lg"
            name="product_id"
            id="productInput"
            list="productList"
            placeholder="Start typing product ID..."
            style="height: 200px"
          />
          <datalist id="productList">
            {% for product in product_objs %}
            <option value="{{ product.id }}">{{ product.id }}</option>
            {% endfor %}
          </datalist>
        </div>
        <button
          type="submit"
          class="rounded w-100 py-3 bg-warning text-dark font-bold h1 my-3"
        >
          Go to Edit Page
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

{% endblock %}

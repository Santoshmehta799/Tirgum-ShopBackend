{% extends "tyreadderapp/base/base.html" %} {% load static %} 


{% block content %}

<style>
  h1 {
    margin-bottom: 20px;
  }

  .form-container-box {
    background-color: blueviolet;
    width: 900px;
    margin: auto;
    padding: 20px;
    color: white;
    display: flex;
    flex-direction: column;
    text-align: center;
    margin: auto;
    height: auto;
  }

  /* @media screen and (max-width: 500px) {
    .form-container-box {
      background-color: blue;

    }
  } */

  .form-container-box select {
    font-size: 40px;
    height: 120px;
  }

  .form-container-box input {
    font-size: 40px;
  }

  input {
    width: 90%;
    height: 100px;
    border-radius: 12px;
    text-align: center;
  }

  select {
    width: 90%;
    height: 150px;
    border-radius: 12px;
    text-align: center;
  }

  select option {
    height: 150px;
  }

  button {
    background-color: crimson;
    height: 90px;
    width: 90%;
    border-radius: 15px;
  }

  .choose-images-control-form input {
    font-size: 20px;
    width: 100%;
    content: "Wybierz zdjęcia";
  }

  .label-section {
    margin-top: 30px;
  }

  /* .additionals {
    height: 150px;
    width: 150px;
    background-color: blueviolet;
    color: yellow;
  } */
  .check-container {
    height: auto;
    width: 100%;
    display: flex;
    flex-direction: row;
    padding-bottom: 15px;
  }

  .additionals {
    width: 100%;
    height: auto;
    background-color: black;
    display: flex;
    flex-direction: row;
    color: white;
    padding-left: 15px;
    padding-top: 15px;
    padding-bottom: 15px;
    border-radius: 15px;
  }

  .item {
    margin-bottom: 25px;
    border-top: 1px solid white;
  }

  input[type="file"]::file-selector-button {
    border: 2px solid #6c5ce7;
    padding: 0.2em 0.4em;
    border-radius: 10px;
    background-color: #a29bfe;
    transition: 1s;
    width: 100%;
    height: 50px;
    font-size: 20px;
    display: flex;
    flex-direction: column;
  }
</style>



    <div class="form-container-box">
      <h1>Add more Image for product: {{product.brand}}-{{product.tread}}-{{product.size}}</h1>

      <form
        id="post_form"
        action=""
        method="post"
        enctype="multipart/form-data"
      >
      {% csrf_token %} 
        <div id="image_div">
          <label for="image">Wybierz zdjęcia</label>
          <input type="file" id="image" name="image" required multiple onchange="showSelectedFiles(this)">
          <pre id="selected_files"></pre>
        </div>
        <br /><br />

        <button type="submit">Dodaj</button>
      </form>
    </div>
  </body>
</html>

<script>
  
  function showSelectedFiles(input) {
    const files = input.files;
    if (!files.length) {
      document.getElementById('selected_files').textContent = 'No files selected';
      return;
    }
  
    const selectedFileNames = [];
    for (const file of files) {
      selectedFileNames.push(file.name);
    }
  
    const fileNamesText = selectedFileNames.join('\n');
    document.getElementById('selected_files').textContent = 'Selected files: ' + fileNamesText;
  }
</script>
{% endblock %}

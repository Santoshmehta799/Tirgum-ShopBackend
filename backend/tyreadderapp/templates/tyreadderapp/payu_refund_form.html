{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Refund Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .refund-card {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            background: #fff;
        }

        .form-label {
            font-weight: bold;
        }

        .refund-title {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .btn-refund {
            background-color: #dc3545;
            border-color: #dc3545;
        }

        .btn-refund:hover {
            background-color: #bd2130;
            border-color: #bd2130;
        }

        .form-control {
            font-size: 0.95rem;
        }

        textarea.form-control {
            resize: vertical;
        }
    </style>
</head>
<body class="bg-light">
    <div class="refund-card">
        <h4 class="refund-title">Refund Request</h4>
        <form method="post" action="{% url 'orders:process_refund' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="order_id" class="form-label">Order ID</label>
                <input type="text" id="order_id" name="order_id" class="form-control" value="{{ order_id }}" readonly>
            </div>

            <div class="mb-3">
                <label for="reason" class="form-label">Refund Reason</label>
                <textarea id="description" name="description" class="form-control" rows="3" placeholder="Customer changed mind"></textarea>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label">Amount (PLN)</label>
                <input type="text" id="amount" name="amount" class="form-control" placeholder="99.99">
            </div>

            <button type="submit" class="btn btn-refund text-white w-100">
                Submit Refund
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "tyreadderapp/base/base.html" %}

{% block title %}
    Update Refresh Token
{% endblock %}

{% block content %}
    <h2 style="text-align: center; color: #333;">Update Refresh Token</h2>
    <p style="text-align: center; color: #555;">
        Click the button below to authorize and update your refresh token:
    </p>
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ auth_url }}" target="_blank" 
           style="display: inline-block; 
                  padding: 12px 24px; 
                  background-color: #4CAF50; 
                  color: white; 
                  text-decoration: none; 
                  font-size: 16px; 
                  border-radius: 8px;
                  transition: background-color 0.3s ease;">
            Authorize OLX
        </a>
    </div>
{% endblock %}

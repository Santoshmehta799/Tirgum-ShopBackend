<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your OTP Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding: 10px 0;
            background-color: #007bff;
            color: #ffffff;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .otp-code {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #ffffff;
            font-size: 24px;
            border-radius: 4px;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        .footer {
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tirgum PL</h1>
        </div>
        <div class="content">
            <p>Hello!</p>
            <p>We received a request to access your Tirgum PL account. Use the following OTP code to complete your login:</p>
            <div class="otp-code">{{ otp_code }}</div>
            <p>If you did not request this code, you can safely ignore this email.</p>
            <p>Thank you,</p>
            <p>The Tirgum PL Team</p>
        </div>
        <div class="footer">
            <p>&copy; 2024 Tirgum PL. All rights reserved.</p>
        </div>
    </div>
</body>
</html>

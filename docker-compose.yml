version: "3.8"

services:
  db:
    image: postgres:16
    env_file:
      - .env
    restart: always
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
    - ./backend:/app
    - /var/www/tirgumpanel/static:/app/staticfiles
    - /var/www/tirgumpanel/media:/app/media 
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_ENV=prod
    depends_on:
      - db
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000"

